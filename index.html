				  <div class="box">
    <h1>⌚</h1>
    <p id="clock">Loading...</p>
  </div>

  <div class="box">
    <h2>₿</h2>
    <p>$<span id="btc">Loading...</span></p>
  </div>

  <script>
    // REAL-TIME CLOCK
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    
    async function updateBitcoin() {
      try {
        const response = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
        );
        const data = await response.json();
        document.getElementById("btc").textContent =
          data.bitcoin.usd.toLocaleString();
      } catch (error) {
        document.getElementById("btc").textContent = "Error";
      }
    }

    updateBitcoin();
    setInterval(updateBitcoin, 15000); // update every 15 seconds
  </script>
